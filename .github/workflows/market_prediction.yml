name: USA Stock Market Prediction

on:
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan type: premarket, intraday, after_market, weekly"
        required: true
        default: "premarket"
  schedule:
    # Premarket scan: 11:00 UTC = 6:00 AM ET during standard time, adjust as needed for DST.
    - cron: "0 11 * * 1-5"
    # After-market scan: 22:00 UTC = 5:00 PM ET during standard time, adjust as needed for DST.
    - cron: "0 22 * * 1-5"
    # Weekend deep scan.
    - cron: "0 15 * * 6"

jobs:
  market-prediction:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Run market prediction scan
        env:
          APP_ENV: production
          PYTHONPATH: src
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          SCAN="${{ github.event.inputs.scan_type || 'premarket' }}"
          echo "Running scan: $SCAN"
          case "$SCAN" in
            weekly)       python -m eaglesignal run --strategy long_term --horizon 20D ;;
            intraday)     python -m eaglesignal run --strategy intraday --horizon 1D ;;
            after_market) python -m eaglesignal run --strategy earnings --horizon 5D ;;
            *)            python -m eaglesignal run --strategy swing --horizon 5D ;;
          esac

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-prediction-reports
          path: |
            reports/**
          if-no-files-found: ignore
