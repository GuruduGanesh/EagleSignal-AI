market_day_workflow:
  before_market_open:
    check: [futures, treasury_yields, oil, dollar, vix, economic_calendar]
    preferred_sources: [investing_com, tradingview, marketwatch, treasury_yield_curve, cboe_vix]
  at_major_830am_et_releases:
    check: [cpi, jobs, pce, gdp, retail_sales, jobless_claims]
    preferred_sources: [bls, bea, census_economic_indicators, fred]
  during_market:
    check: [spy, qqq, iwm, sector_etfs, vix, bond_yields, top_movers, unusual_options]
    preferred_sources: [tradingview, finviz, cboe_daily_market_statistics, koyfin]
  after_market:
    check: [earnings, guidance, sec_8k_filings, analyst_reactions]
    preferred_sources: [nasdaq_earnings_calendar, sec_edgar, reuters_markets, seeking_alpha, company_investor_relations]
  weekend:
    check: [macro_trend, fed_probabilities, sector_rotation, next_week_earnings, geopolitical_risks]
    preferred_sources: [fred, cme_fedwatch, tradingview, investing_com, reuters_markets, federal_register, white_house]
