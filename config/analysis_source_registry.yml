# config/analysis_source_registry.yml
#
# Additive source registry for EagleSignal AI. This does not remove or replace
# existing connectors. It defines the target source stack, reliability, access
# method, and use case for analysis and recommendations.

minimum_daily_stack:
  - tradingview
  - investing_com
  - finviz
  - reuters_markets
  - sec_edgar
  - bls
  - bea
  - fred
  - cboe

source_priority_rules:
  - Official primary sources beat aggregators and commentary.
  - Exchange/licensed market data beats free delayed quote pages for trade timing.
  - Aggregator dashboards are useful for monitoring, but important signals must be verified against primary sources.
  - Paid/professional terminals are optional upgrades, not required for local MVP operation.
  - Social and opinion sources are sentiment/context only and must never dominate final recommendations.
  - If a source is delayed, stale, paywalled, blocked, or manually checked only, mark that status in the trace.

dashboard_and_research_platforms:
  tradingview:
    role: daily_dashboard
    best_for: [charts, technicals, economic_calendar, earnings_calendar, alerts, sectors, futures]
    access: manual_or_widget_or_api_if_licensed
    reliability_rank: 70
    status: planned_manual_reference
  investing_com:
    role: macro_global_dashboard
    best_for: [economic_calendar, global_markets, futures, commodities, bonds, previous_forecast_actual]
    access: manual_or_licensed_api
    reliability_rank: 70
    status: planned_manual_reference
  finviz:
    role: market_overview
    best_for: [screeners, heat_maps, insider_trades, futures, forex, news]
    access: manual_or_elite_if_licensed
    reliability_rank: 65
    status: planned_manual_reference
    notes: Some quotes are delayed; never use alone for live trading decisions.
  koyfin:
    role: research_dashboard
    best_for: [company_financials, macro_dashboards, global_markets, portfolios, reports]
    access: manual_or_paid_platform
    reliability_rank: 75
    status: optional_paid_reference
  reuters_markets:
    role: market_news
    best_for: [market_moving_news, global_markets, stocks, commodities, currencies, economics]
    access: public_site_or_lseg_paid
    reliability_rank: 85
    status: planned_news_reference

