# EagleSignal AI — curated market-moving event calendar (research only).
#
# This file holds high-confidence, officially-published dates that cannot be
# derived by a simple rule (mainly FOMC decision days). Recurring releases that
# ARE rule-derivable (NFP = first Friday, weekly jobless claims = Thursdays) are
# generated in code and need not be listed here. Earnings dates come live from
# the keyless earnings connector. NEVER guess a date — only list dates confirmed
# from the official source. Update annually from the Federal Reserve schedule
# (federalreserve.gov/monetarypolicy/fomccalendars.htm).
#
# impact: high | medium | low   (drives event-risk gating in the engine)

